name: CI

on:
  push:
    branches:
      - claude_routine
      - master
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Maven verify
        run: ./mvnw -B -ntp -Dstyle.color=always verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7

  compose-smoke:
    name: Compose stack smoke test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Free host port 5432 if Postgres is preinstalled
        run: sudo systemctl stop postgresql 2>/dev/null || true

      - name: Start compose stack
        run: docker compose up -d --build

      - name: Wait for /actuator/health = UP
        run: |
          set -e
          deadline=$((SECONDS + 180))
          while [ $SECONDS -lt $deadline ]; do
            if curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -q '"status":"UP"'; then
              echo "App reported UP after ${SECONDS}s"
              exit 0
            fi
            sleep 3
          done
          echo "Timed out waiting for /actuator/health=UP after 180s" >&2
          exit 1

      - name: Smoke /pricing returns 200 with brand marker
        run: |
          set -e
          body=$(curl -fsS http://localhost:8080/pricing)
          echo "$body" | grep -q 'MailIM' \
            || { echo "Pricing response missing 'MailIM' marker" >&2; exit 1; }

      - name: Smoke /login returns 200
        run: |
          set -e
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/login)
          test "$code" = "200" \
            || { echo "Unexpected /login status $code" >&2; exit 1; }

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker:
    name: Build & publish Docker image
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/claude_routine' }}

      - name: Build (and push on non-PR events)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
