# Local + small-deploy stack: Postgres + the Spring Boot app.
#
# Quick start:
#   docker compose up --build
#
# Stripe / mailbox encryption / SMTP secrets are read from the host environment
# (or a sibling `.env` file). Anything not set falls back to a dev default,
# except DB credentials, which always come from this file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: email-messenger-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: email_messenger
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d email_messenger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-messenger-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/email_messenger
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD:-postgres}

      # SMTP for outbound replies (set on the host or in a .env file).
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}

      # Stripe billing (test or live keys). Empty values disable checkout.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PERSONAL_PRICE_ID: ${STRIPE_PERSONAL_PRICE_ID:-}
      STRIPE_TEAM_PRICE_ID: ${STRIPE_TEAM_PRICE_ID:-}
      STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID:-}
      BILLING_SUCCESS_URL: ${BILLING_SUCCESS_URL:-}
      BILLING_CANCEL_URL: ${BILLING_CANCEL_URL:-}
      BILLING_PORTAL_RETURN_URL: ${BILLING_PORTAL_RETURN_URL:-}
      BILLING_TRIAL_DAYS: ${BILLING_TRIAL_DAYS:-14}

      # IMAP credential encryption. Generate strong values for any real deploy:
      #   MAILBOX_ENCRYPTION_PASSWORD=$(openssl rand -base64 32)
      #   MAILBOX_ENCRYPTION_SALT=$(openssl rand -hex 8)
      MAILBOX_ENCRYPTION_PASSWORD: ${MAILBOX_ENCRYPTION_PASSWORD:-}
      MAILBOX_ENCRYPTION_SALT: ${MAILBOX_ENCRYPTION_SALT:-}

      # Scheduled IMAP polling (default off; flip on once a real mailbox is connected).
      MAILBOX_POLLING_ENABLED: ${MAILBOX_POLLING_ENABLED:-false}
      MAILBOX_POLLING_INTERVAL_MS: ${MAILBOX_POLLING_INTERVAL_MS:-300000}
      MAILBOX_POLLING_INITIAL_DELAY_MS: ${MAILBOX_POLLING_INITIAL_DELAY_MS:-30000}

      PORT: 8080
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  postgres-data:
