spring:
  application:
    name: email-messenger
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validateMigrationNaming: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,text/plain
    min-response-size: 1024

logging:
  level:
    com.emailmessenger: INFO
    org.flywaydb: INFO
    root: WARN

app:
  base-url: ${APP_BASE_URL:https://mailaim.app}
  imap:
    host: ${IMAP_HOST:}
    port: ${IMAP_PORT:993}
    ssl: ${IMAP_SSL:true}
    folder: ${IMAP_FOLDER:INBOX}
    username: ${IMAP_USER:}
    password: ${IMAP_PASS:}
    polling:
      enabled: ${IMAP_POLLING_ENABLED:false}
      interval-ms: ${IMAP_POLLING_INTERVAL_MS:60000}
