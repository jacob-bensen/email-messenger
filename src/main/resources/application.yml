spring:
  application:
    name: email-messenger
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:emailmessenger;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: localhost
    port: 1025
    protocol: smtp

billing:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    personal-price-id: ${STRIPE_PERSONAL_PRICE_ID:}
    team-price-id: ${STRIPE_TEAM_PRICE_ID:}
    enterprise-price-id: ${STRIPE_ENTERPRISE_PRICE_ID:}
    success-url: ${BILLING_SUCCESS_URL:http://localhost:8080/billing/success?session_id={CHECKOUT_SESSION_ID}}
    cancel-url: ${BILLING_CANCEL_URL:http://localhost:8080/billing/cancel}
    portal-return-url: ${BILLING_PORTAL_RETURN_URL:http://localhost:8080/threads}
    trial-days: 14

mailbox:
  encryption:
    password: ${MAILBOX_ENCRYPTION_PASSWORD:}
    salt: ${MAILBOX_ENCRYPTION_SALT:}
  polling:
    enabled: ${MAILBOX_POLLING_ENABLED:false}
    interval-ms: ${MAILBOX_POLLING_INTERVAL_MS:300000}
    initial-delay-ms: ${MAILBOX_POLLING_INITIAL_DELAY_MS:30000}

logging:
  level:
    com.emailmessenger: DEBUG
    org.flywaydb: INFO

server:
  port: 8080
  error:
    whitelabel:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

billing:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    personal-price-id: ${STRIPE_PERSONAL_PRICE_ID:}
    team-price-id: ${STRIPE_TEAM_PRICE_ID:}
    enterprise-price-id: ${STRIPE_ENTERPRISE_PRICE_ID:}
    success-url: ${BILLING_SUCCESS_URL:}
    cancel-url: ${BILLING_CANCEL_URL:}
    portal-return-url: ${BILLING_PORTAL_RETURN_URL:}
    trial-days: ${BILLING_TRIAL_DAYS:14}

mailbox:
  encryption:
    password: ${MAILBOX_ENCRYPTION_PASSWORD:}
    salt: ${MAILBOX_ENCRYPTION_SALT:}
  polling:
    enabled: ${MAILBOX_POLLING_ENABLED:false}
    interval-ms: ${MAILBOX_POLLING_INTERVAL_MS:300000}
    initial-delay-ms: ${MAILBOX_POLLING_INITIAL_DELAY_MS:30000}

logging:
  level:
    com.emailmessenger: INFO
    root: WARN

server:
  port: ${PORT:8080}
