spring:
  application:
    name: email-messenger

  # Reply attachment upload caps; oversized uploads surface a friendly 413
  # via GlobalExceptionHandler.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  # Database connection comes entirely from environment variables. For local
  # development use the `local` profile (application-local.yml). Tests run
  # against H2 via src/test/resources/application.yml.
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Google "Continue with Google" sign-in. Activated only when the client-id is
# non-blank — SecurityConfig keys off the ClientRegistrationRepository bean,
# which is only built when both id and secret are present.
auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

# Mail health is disabled because the SMTP host is best-effort, not a liveness
# signal — a flaky relay must not flap the whole app. Everything else uses
# Boot's defaults (only /actuator/health exposed).
management:
  health:
    mail:
      enabled: false

# Stripe API credentials. Both are secrets; billing stays inert until set.
# Price IDs and redirect URLs default to empty in BillingProperties.
billing:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# Symmetric key + salt for encrypting stored mailbox (IMAP/SMTP) credentials.
# Must be set in prod — see CredentialEncryptor's dev-fallback warning.
mailbox:
  encryption:
    password: ${MAILBOX_ENCRYPTION_PASSWORD:}
    salt: ${MAILBOX_ENCRYPTION_SALT:}
  # On by default so connected mailboxes auto-pull new mail. Interval/zone
  # knobs fall back to the @Scheduled defaults in MailboxPollingScheduler.
  polling:
    enabled: ${MAILBOX_POLLING_ENABLED:true}

# Operator allowlist gating /admin/**. Comma-separated; empty means no admins
# and every /admin/** request 404s. Cron schedulers (digest, reengagement,
# activation, trial-end, admin weekly-digest) stay off unless their *.enabled
# flag is explicitly set to true.
admin:
  emails: ${ADMIN_EMAILS:}

logging:
  level:
    com.emailmessenger: INFO
    root: WARN

server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,text/plain
    min-response-size: 1024
