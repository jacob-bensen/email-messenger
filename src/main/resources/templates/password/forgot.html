<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <th:block th:replace="~{fragments/seo :: meta(
      pageTitle='Reset your password — MailIM',
      pageDescription='Forgot your MailIM password? Enter your email and we will send a link to set a new one.',
      pagePath='/password/forgot')}"></th:block>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<header class="app-header">
  <a href="/" class="brand">MailIM</a>
  <nav class="header-nav">
    <a href="/pricing">Pricing</a>
    <a href="/login">Sign in</a>
  </nav>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h1>Reset your password</h1>

    <div th:if="${status == 'sent'}" class="alert alert-success">
      If we have an account for that email, we just sent a password-reset link.
      The link expires in one hour.
    </div>

    <p class="auth-sub" th:if="${status == null}">
      Enter the email you signed up with. We'll send you a link to set a new
      password.
    </p>

    <form th:if="${status == null}"
          method="post" th:action="@{/password/forgot}" class="auth-form" autocomplete="on">
      <label class="auth-label">
        <span>Email</span>
        <input type="email" name="email" required autofocus autocomplete="username">
      </label>

      <button type="submit" class="btn btn-primary auth-submit">Send reset link</button>
    </form>

    <p class="auth-alt">
      Remembered it?
      <a href="/login">Sign in</a>.
    </p>
  </section>
</main>

<footer class="marketing-footer">
  <span>&copy; MailIM</span>
  <nav>
    <a href="/pricing">Pricing</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="/refund">Refund</a>
  </nav>
</footer>

<th:block th:replace="~{fragments/cookie-banner :: banner}"></th:block>

</body>
</html>
