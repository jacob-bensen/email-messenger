<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title th:text="|${senderConversation.sender().displayName() != null ? senderConversation.sender().displayName() : senderConversation.sender().email()} — ConexusMail|">Sender — ConexusMail</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2f855a">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ConexusMail">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div class="app-shell">

<th:block th:replace="~{fragments/app-nav :: nav}"></th:block>

<div class="workspace workspace-with-rail">

  <th:block th:replace="~{fragments/sender-rail :: rail}"></th:block>

  <main class="chat-pane">

    <header class="chat-subheader">
      <div class="chat-subheader-avatar" aria-hidden="true"
           th:text="${senderConversation.sender().initials()}">AB</div>
      <div class="chat-subheader-id">
        <div class="chat-subheader-name"
             th:text="${senderConversation.sender().displayName() != null ? senderConversation.sender().displayName() : senderConversation.sender().email()}">Ada Lovelace</div>
        <div class="chat-subheader-meta"
             th:text="|${senderConversation.messageCount()} message${senderConversation.messageCount() != 1 ? 's' : ''} · ${senderConversation.threadCount()} thread${senderConversation.threadCount() != 1 ? 's' : ''}|">
          12 messages · 3 threads
        </div>
      </div>
      <a class="btn btn-secondary btn-compact chat-view-toggle"
         th:href="@{/threads(from=${senderConversation.sender().email()})}">View as threads</a>
    </header>

    <div th:if="${billingBanner != null and billingBanner.trialEnding}"
         class="trial-banner trial-banner-compact"
         th:classappend="${billingBanner.daysLeft <= 3} ? ' trial-banner-urgent' : ''">
      <span class="trial-banner-text">
        <strong th:if="${billingBanner.daysLeft == 0}">Trial ends today.</strong>
        <strong th:if="${billingBanner.daysLeft == 1}">Trial ends tomorrow.</strong>
        <strong th:if="${billingBanner.daysLeft > 1}"
                th:text="|Trial ends in ${billingBanner.daysLeft} days.|">Trial ends in 14 days.</strong>
      </span>
      <a href="/pricing" class="trial-banner-link">Add card →</a>
    </div>

    <div class="messages" id="messages">

      <!--
        Each run is a span of consecutive messages from this sender that share a
        thread; th:utext renders pre-sanitized HTML (jsoup, in ConversationService).
      -->
      <div class="bubble-run" th:each="run : ${senderConversation.runs()}"
           th:classappend="${run.outbound()} ? ' bubble-run-me' : ''"
           th:attr="data-date=${run.date() != null ? #temporals.format(run.date(), 'yyyy-MM-dd') : ''}"
      >
        <div class="avatar"
             th:text="${run.sender().initials()}"
             th:title="${run.sender().displayName() != null ? run.sender().displayName() : run.sender().email()}">
          AB
        </div>
        <div class="bubble-group">
          <div class="bubble-sender" th:if="${run.outbound()}">You</div>
          <div class="bubble-sender" th:unless="${run.outbound()}"
               th:text="${run.sender().displayName() != null ? run.sender().displayName() : run.sender().email()}">Sender</div>
          <a class="thread-badge"
             th:href="@{/threads/{id}(id=${run.thread().threadId()})}"
             th:title="${run.thread().subject()}">
            <span class="thread-badge-icon" aria-hidden="true">#</span>
            <span class="thread-badge-subject" th:text="${run.thread().subject()}">Thread subject</span>
          </a>
          <div th:each="bubble : ${run.messages()}">
            <div class="bubble" th:id="|msg-${bubble.messageId()}|"
                 th:classappend="${run.outbound()} ? ' bubble-me' : ''">
              <a class="reply-ref" th:if="${bubble.replyToMessageId() != null}"
                 th:href="|#msg-${bubble.replyToMessageId()}|">↩ In reply to</a>
              <div class="bubble-text"
                   th:if="${bubble.bodyHtml() != null and !bubble.bodyHtml().isBlank()}"
                   th:utext="${bubble.bodyHtml()}">Message body</div>
              <ul class="bubble-attachments" th:if="${!#lists.isEmpty(bubble.attachments())}">
                <li class="bubble-attachment" th:each="att : ${bubble.attachments()}">
                  <span aria-hidden="true">📎</span>
                  <span class="bubble-attachment-name" th:text="${att.filename}">file.txt</span>
                </li>
              </ul>
            </div>
            <div class="bubble-time"
                 th:text="${#temporals.format(bubble.sentAt(), 'MMM d, h:mm a')}">Jan 1, 12:00 PM</div>
          </div>
        </div>
      </div>

    </div>

  </main>
</div>
</div>

<script th:inline="javascript">
(function () {
  const msgs = document.getElementById('messages');
  if (!msgs) return;
  const runs = Array.from(msgs.querySelectorAll('.bubble-run'));
  let lastDate = null;
  runs.forEach(function (run) {
    const date = run.dataset.date;
    if (!date || date === lastDate) { lastDate = date || lastDate; return; }
    const sep = document.createElement('div');
    sep.className = 'day-separator';
    sep.innerHTML = '<span>' + formatDateLabel(date) + '</span>';
    msgs.insertBefore(sep, run);
    lastDate = date;
  });
  msgs.scrollTop = msgs.scrollHeight;
}());

// "In reply to" links scroll to (and briefly highlight) the referenced bubble.
(function () {
  document.addEventListener('click', function (e) {
    var ref = e.target.closest ? e.target.closest('.reply-ref') : null;
    if (!ref) return;
    var href = ref.getAttribute('href') || '';
    if (href.charAt(0) !== '#') return;
    var target = document.getElementById(href.slice(1));
    if (!target) return;
    e.preventDefault();
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.add('bubble-flash');
    setTimeout(function () { target.classList.remove('bubble-flash'); }, 1200);
  });
}());

function formatDateLabel(iso) {
  var parts = iso.split('-');
  var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (d.getTime() === today.getTime())     return 'Today';
  if (d.getTime() === yesterday.getTime()) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
</script>

</body>
</html>
