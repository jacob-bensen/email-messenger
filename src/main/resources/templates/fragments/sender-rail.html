<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!--
  Persistent left navigation shared by the inbox (/threads) and the per-sender
  chat (/senders). Clicking a sender opens their full cross-thread chat by
  default; "Everyone" returns to the thread list. Saved searches render only on
  pages that supply them.
-->
<aside th:fragment="rail"
       class="sender-rail"
       th:if="${(senderGroups != null and !senderGroups.isEmpty()) or (savedSearches != null and !savedSearches.isEmpty())}"
       aria-label="Inbox filters">
  <details class="sender-rail-details saved-search-rail"
           th:if="${savedSearches != null and !savedSearches.isEmpty()}" open>
    <summary class="sender-rail-summary">
      <span>Saved searches</span>
      <span class="sender-rail-toggle-hint" aria-hidden="true">▾</span>
    </summary>
    <div th:each="saved : ${savedSearches}"
         class="saved-search-row"
         th:classappend="${saved.matches(searchQuery, activeSender,
                            activeFilters != null ? activeFilters.sincePreset() : null,
                            activeFilters != null ? activeFilters.requireUnread() : false,
                            activeFilters != null ? activeFilters.requireAttachments() : false)} ? ' saved-search-active' : ''">
      <a th:href="@{/threads(s=${saved.id()},
                              q=${saved.hasQuery()} ? ${saved.query()} : null,
                              from=${saved.hasSender()} ? ${saved.senderEmail()} : null,
                              since=${saved.hasSincePreset()} ? ${saved.sincePreset()} : null,
                              unread=${saved.requireUnread()} ? 'true' : null,
                              attachments=${saved.requireAttachments()} ? 'true' : null)}"
         class="saved-search-link">
        <span class="saved-search-icon" aria-hidden="true">★</span>
        <span class="saved-search-name" th:text="${saved.name()}">My saved search</span>
        <span class="saved-search-new"
              th:if="${saved.hasNew()}"
              th:text="${saved.newCount()}"
              th:attr="aria-label=|${saved.newCount()} new since last visit|">3</span>
        <span class="saved-search-count"
              th:text="${saved.matchCount()}"
              th:attr="aria-label=|${saved.matchCount()} matching threads|">12</span>
      </a>
      <form th:action="@{/searches/{id}/delete(id=${saved.id()})}" method="post"
            class="saved-search-delete-form"
            onsubmit="return confirm('Delete this saved search?');">
        <input type="hidden" name="q" th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}" th:value="${searchQuery}">
        <input type="hidden" name="from" th:if="${activeSender != null}" th:value="${activeSender}">
        <input type="hidden" name="since" th:if="${activeFilters != null and activeFilters.sincePreset() != null}" th:value="${activeFilters.sincePreset()}">
        <input type="hidden" name="unread" value="true" th:if="${activeFilters != null and activeFilters.requireUnread()}">
        <input type="hidden" name="attachments" value="true" th:if="${activeFilters != null and activeFilters.requireAttachments()}">
        <input type="hidden" th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="saved-search-delete" aria-label="Delete saved search">&times;</button>
      </form>
    </div>
  </details>
  <details class="sender-rail-details" th:if="${senderGroups != null and !senderGroups.isEmpty()}" open>
    <summary class="sender-rail-summary">
      <span>Senders</span>
      <span class="sender-rail-toggle-hint" aria-hidden="true">▾</span>
    </summary>
    <a class="sender-rail-row sender-rail-everyone"
       th:classappend="${activeSender == null} ? ' sender-rail-active' : ''"
       th:href="@{/threads}">
      <span class="sender-rail-avatar sender-rail-avatar-everyone" aria-hidden="true">∗</span>
      <span class="sender-rail-text">
        <span class="sender-rail-name">Everyone</span>
      </span>
    </a>
    <a th:each="sender : ${senderGroups}"
       th:href="@{/senders(email=${sender.email()})}"
       class="sender-rail-row"
       th:classappend="${activeSender != null and #strings.equalsIgnoreCase(activeSender, sender.email())} ? ' sender-rail-active' : ''">
      <span class="sender-rail-avatar" aria-hidden="true" th:text="${sender.initials()}">AB</span>
      <span class="sender-rail-text">
        <span class="sender-rail-name" th:text="${sender.label()}">Ada Lovelace</span>
        <span class="sender-rail-email"
              th:if="${sender.displayName() != null and !#strings.isEmpty(sender.displayName())}"
              th:text="${sender.email()}">ada@acme.com</span>
      </span>
      <span class="sender-rail-count" th:text="${sender.threadCount()}">12</span>
    </a>
  </details>
</aside>

</body>
</html>
