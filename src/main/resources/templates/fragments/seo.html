<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <!--
    SEO + social-card fragment. Callers pass:
      pageTitle       — <title>
      pageDescription — meta description + og:description + twitter:description
      pagePath        — canonical path on this site, e.g. "/", "/pricing"
    siteBaseUrl is supplied by SiteModelAdvice for every request.
  -->
  <th:block th:fragment="meta(pageTitle, pageDescription, pagePath)">
    <title th:text="${pageTitle}">MailIM</title>
    <meta name="description" th:content="${pageDescription}">
    <link rel="canonical" th:href="${siteBaseUrl + pagePath}">

    <meta property="og:site_name" content="MailIM">
    <meta property="og:type" content="website">
    <meta property="og:title" th:content="${pageTitle}">
    <meta property="og:description" th:content="${pageDescription}">
    <meta property="og:url" th:content="${siteBaseUrl + pagePath}">
    <meta property="og:image" th:content="${siteBaseUrl + '/images/og-card.png'}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${pageTitle}">
    <meta name="twitter:description" th:content="${pageDescription}">
    <meta name="twitter:image" th:content="${siteBaseUrl + '/images/og-card.png'}">

    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#4f80ff">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MailIM">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  </th:block>
</head>
</html>
