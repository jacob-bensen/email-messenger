<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!--
  Persistent left sidebar for the authenticated app: brand, the connected
  email accounts under a "Chats" header (each one selectable — selecting it
  scopes the chats list to that account; accounts are never merged into one
  view), an add-mailbox button, then the Pricing and Settings sections.
  Data comes from NavModelAdvice so every page renders it identically; the
  active account (navActiveMailboxId) is set by the chats controller.
-->
<aside th:fragment="nav" class="app-nav" aria-label="Primary navigation">
  <a class="app-nav-brand" href="/chats">ConexusMail</a>

  <div class="app-nav-section">
    <a class="app-nav-link app-nav-dashboard" href="/chats"
       th:classappend="${navActive == 'chats' and navActiveMailboxId == null} ? ' app-nav-link-active' : ''">
      <span class="app-nav-ico" aria-hidden="true">▦</span> Dashboard
    </a>
    <ul class="app-nav-mailboxes" th:if="${navMailboxes != null and !navMailboxes.isEmpty()}">
      <li th:each="mb : ${navMailboxes}">
        <a class="app-nav-mailbox"
           th:href="@{/chats(mailbox=${mb.id()})}"
           th:classappend="${navActiveMailboxId != null and navActiveMailboxId == mb.id()} ? ' app-nav-mailbox-active' : ''"
           th:title="${mb.address()}">
          <span class="app-nav-mailbox-ico" aria-hidden="true">✉</span>
          <span class="app-nav-mailbox-addr" th:text="${mb.address()}">you@example.com</span>
        </a>
      </li>
    </ul>
    <p class="app-nav-empty" th:if="${navMailboxes == null or navMailboxes.isEmpty()}">
      No email accounts yet.
    </p>
    <a class="app-nav-add" href="/mailboxes/new">
      <span aria-hidden="true">＋</span> Add mailbox
    </a>
  </div>

  <hr class="app-nav-divider" aria-hidden="true">

  <nav class="app-nav-links" aria-label="Sections">
    <a class="app-nav-link" href="/pricing"
       th:classappend="${navActive == 'pricing'} ? ' app-nav-link-active' : ''">
      <span class="app-nav-ico" aria-hidden="true">🏷️</span> Pricing
    </a>
    <a class="app-nav-link" href="/account"
       th:classappend="${navActive == 'settings'} ? ' app-nav-link-active' : ''">
      <span class="app-nav-ico" aria-hidden="true">⚙️</span> Settings
    </a>
    <form th:if="${navHasBilling}" th:action="@{/billing/portal}" method="post" class="app-nav-form">
      <input type="hidden" th:if="${_csrf != null}"
             th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="app-nav-link app-nav-link-button">
        <span class="app-nav-ico" aria-hidden="true">💳</span> Billing
      </button>
    </form>
  </nav>

  <div class="app-nav-footer">
    <div class="app-nav-profile">
      <span class="app-nav-avatar" aria-hidden="true"
            th:text="${navProfileName != null ? #strings.toUpperCase(#strings.substring(navProfileName, 0, 1)) : '?'}">A</span>
      <span class="app-nav-name" th:text="${navProfileName}" th:title="${navProfileName}">You</span>
    </div>
    <form th:action="@{/logout}" method="post" class="app-nav-form">
      <input type="hidden" th:if="${_csrf != null}"
             th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="app-nav-signout">Sign out</button>
    </form>
  </div>
</aside>

</body>
</html>
