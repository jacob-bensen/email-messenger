<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="|${status} — MailIM|">Error — MailIM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .status { font-size: 64px; font-weight: 700; color: #e55353; line-height: 1; }
    h1 { margin-top: 12px; font-size: 22px; font-weight: 600; }
    p { margin-top: 12px; color: #555; line-height: 1.6; }
    .err-ctas {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .home-link, .demo-link {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
    }
    .home-link {
      background: #4f80ff;
      color: #fff;
    }
    .home-link:hover { background: #3a6be0; }
    .demo-link {
      background: transparent;
      border: 1.5px solid #4f80ff;
      color: #4f80ff;
    }
    .demo-link:hover { background: rgba(79, 128, 255, 0.08); }
    @media (max-width: 520px) {
      .card { padding: 32px 20px; margin: 16px; }
      .status { font-size: 48px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="status" th:text="${status}">500</div>
  <h1 th:text="${status == 404} ? 'Page not found'
                  : (status == 502 or status == 503) ? 'Mail server unreachable'
                  : (status == 409) ? 'Conflict saving data'
                  : 'Something went wrong'">Something went wrong</h1>
  <p th:text="${message}">An unexpected error occurred. Please try again in a moment.</p>
  <div class="err-ctas">
    <a href="/" class="home-link">← Back to MailIM</a>
    <a href="/demo" class="demo-link">Try the demo →</a>
  </div>
  <p style="margin-top:16px;font-size:13px;color:#888;">
    Still stuck? <a href="mailto:support@mailaim.app" style="color:#4f80ff;">Contact support</a>
  </p>
</div>
</body>
</html>
